name: CV Quality Gate

on:
  push:
    branches: [main]
    paths:
      - "platform/scripts/cv_graph_extract.py"
      - "platform/scripts/cv_benchmark.py"
      - "platform/scripts/cv_benchmark_fixtures.json"
      - "platform/cv-service/**"
      - ".github/workflows/cv-quality-gate.yml"
  pull_request:
    paths:
      - "platform/scripts/cv_graph_extract.py"
      - "platform/scripts/cv_benchmark.py"
      - "platform/scripts/cv_benchmark_fixtures.json"
      - "platform/cv-service/**"
      - ".github/workflows/cv-quality-gate.yml"

jobs:
  cv-quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CV dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r platform/cv-service/requirements.txt

      - name: Run extractor self-tests
        run: |
          python platform/scripts/cv_graph_extract.py --self-test

      - name: Run benchmark quality gate
        run: |
          python platform/scripts/cv_benchmark.py \
            --fixtures platform/scripts/cv_benchmark_fixtures.json \
            --min-pass-rate 1.0 \
            --min-required-pass-rate 1.0 \
            --fail-on-case \
            --report platform/cv_benchmark_report.json

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cv-benchmark-report
          path: platform/cv_benchmark_report.json
