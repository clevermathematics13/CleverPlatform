name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  workflow_dispatch:      # Lets you trigger it manually too

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Create Backup
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" > backup-$(date +%Y-%m-%d_%H-%M-%S).sql
          ls -lh backup-*.sql

      - name: Verify Backup (Test Restore)
        run: |
          sudo apt-get install -y postgresql-17
          sudo service postgresql start
          sleep 3
          BACKUP_FILE=$(ls backup-*.sql | head -n 1)
          echo "Restoring $BACKUP_FILE into a throwaway local database on the runner..."
          sudo -u postgres createdb restore_test
          sudo -u postgres psql restore_test < "$BACKUP_FILE"
          echo "Restore complete. Running sanity checks..."
          sudo -u postgres psql restore_test -c "\dt"
          sudo -u postgres psql restore_test -c "SELECT count(*) AS ib_questions_count FROM ib_questions;"
          sudo -u postgres psql restore_test -c "SELECT count(*) AS submissions_count FROM submissions;"
          echo "Verification passed: backup is restorable."

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: backup-*.sql
          tag_name: backup-${{ github.run_id }}
          name: "DB Backup ${{ github.run_id }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
