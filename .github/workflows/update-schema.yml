name: Update SCHEMA.md

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Fetch schema and write SCHEMA.md
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node - <<'EOF'
          const https = require("https");

          const url = new URL(
            "/rest/v1/rpc/get_public_schema",
            process.env.SUPABASE_URL
          );

          const options = {
            hostname: url.hostname,
            path: url.pathname,
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": process.env.SUPABASE_SERVICE_ROLE_KEY,
              "Authorization": `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
            },
          };

          let raw = "";
          const req = https.request(options, (res) => {
            res.on("data", (chunk) => (raw += chunk));
            res.on("end", () => {
              const rows = JSON.parse(raw);
              if (!Array.isArray(rows)) {
                console.error("Unexpected response:", raw);
                process.exit(1);
              }

              const tables = {};
              for (const row of rows) {
                if (!tables[row.table_name]) tables[row.table_name] = [];
                tables[row.table_name].push(row);
              }

              const lines = [
                "# CleverPlatform — Supabase Schema Reference",
                "",
                "> Auto-generated by GitHub Actions. Do not edit manually.",
                "> UI copy rule: `score` / `max_score` columns display as **\"Clev's Marks\"** — never \"grade\", \"score\", or \"points\" alone.",
                "> `profiles.role` drives teacher vs. student gating — always check this for `isTeacher`.",
                "> **Disagreement score** = `abs(self_marks - marks_awarded) / max_marks * 100` — preserve this logic exactly.",
                "",
                "---",
                "",
              ];

              for (const [tableName, cols] of Object.entries(tables).sort()) {
                lines.push(`## \`${tableName}\``);
                lines.push("");
                lines.push("| column | type | nullable |");
                lines.push("|---|---|---|");
                for (const col of cols) {
                  lines.push(`| ${col.column_name} | ${col.data_type} | ${col.is_nullable} |`);
                }
                lines.push("");
              }

              lines.push("---");
              lines.push("");
              lines.push(`_Last updated: ${new Date().toISOString()}_`);
              lines.push("");

              require("fs").writeFileSync("SCHEMA.md", lines.join("\n"));
              console.log(`Written SCHEMA.md with ${Object.keys(tables).length} tables.`);
            });
          });

          req.on("error", (e) => { console.error(e); process.exit(1); });
          req.end();
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SCHEMA.md
          git diff --cached --quiet && echo "No changes." || \
            git commit -m "chore: auto-update SCHEMA.md [skip ci]" && git push
