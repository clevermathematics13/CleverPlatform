name: Platform Supabase Migrations

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "platform/supabase/migrations/**"
      - ".github/workflows/platform-supabase-migrations.yml"
  workflow_dispatch: {}

jobs:
  apply-migrations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: platform/package-lock.json
      - name: Install platform dependencies
        working-directory: platform
        run: npm ci
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Apply production migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.CLEVERPLATFORM_SUPABASE_DB_URL }}
        run: |
          if [[ -z "$SUPABASE_DB_URL" ]]; then
            echo "Skipping migration push because CLEVERPLATFORM_SUPABASE_DB_URL is not configured."
            exit 0
          fi
          supabase db push --db-url "$SUPABASE_DB_URL" --include-all
      - name: Verify production schema after migrations
        working-directory: platform
        env:
          SUPABASE_URL: ${{ secrets.CLEVERPLATFORM_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CLEVERPLATFORM_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [[ -z "$SUPABASE_URL" || -z "$SUPABASE_SERVICE_ROLE_KEY" ]]; then
            echo "Skipping schema probe because CLEVERPLATFORM_SUPABASE_URL or CLEVERPLATFORM_SUPABASE_SERVICE_ROLE_KEY is not configured."
            exit 0
          fi
          npm run deploy:check-schema
